<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mind UFU</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo { font-size: 50px; margin-bottom: 10px; display: block; }
        h1 { margin: 0 0 30px 0; color: #333; font-size: 24px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #1d4ed8; }
        
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="logo">🧠</span>
        <h1>Mind UFU</h1>

        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
            
            <input type="text" placeholder="Usuário ou Matrícula" required>
            
            <input type="password" placeholder="Senha" required>

            <button type="submit">ENTRAR</button>
        </form>

        <div class="footer">Protótipo - Versão 1.0</div>
    </div>
</body>
</html>
