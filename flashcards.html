<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Mind UFU</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style-global.css">

    <style>
        .flashcard-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 80vh; /* Centraliza na tela */
        }

        .card-scene {
            width: 100%; max-width: 600px; height: 350px;
            perspective: 1000px; cursor: pointer; margin-bottom: 2rem;
        }

        .card-flip {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s; transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 16px;
        }

        .card-flip.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 32px; text-align: center; border: 1px solid #e5e7eb;
        }

        .card-front { background: white; color: #1f2937; }
        
        .card-back { 
            background: var(--ufu-indigo); color: white; transform: rotateY(180deg); 
        }

        .card-text { font-size: 24px; font-weight: 500; line-height: 1.5; }
        .card-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="container-fluid">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold m-0">Revisão: Cálculo I</h2>
                    <p class="text-muted m-0 small">Baralho de Derivadas • 24 cartões</p>
                </div>
                <button class="btn btn-outline-secondary btn-sm">Voltar aos Baralhos</button>
            </div>

            <div class="flashcard-wrapper">
                <div class="card-scene" onclick="this.querySelector('.card-flip').classList.toggle('is-flipped')">
                    <div class="card-flip">
                        <div class="card-face card-front">
                            <span class="card-label text-primary">Pergunta</span>
                            <p class="card-text">Qual é a derivada de f(x) = x²?</p>
                            <span class="small text-muted mt-3"><i class="bi bi-arrow-repeat"></i> Clique para virar</span>
                        </div>
                        <div class="card-face card-back">
                            <span class="card-label">Resposta</span>
                            <p class="card-text fw-bold">f'(x) = 2x</p>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-light border"><i class="bi bi-arrow-left"></i> Anterior</button>
                    <button class="btn btn-success text-white">Acertei</button>
                    <button class="btn btn-danger text-white">Errei</button>
                    <button class="btn btn-light border">Próximo <i class="bi bi-arrow-right"></i></button>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/sidebar.js"></script>
<script>
    $(document).ready(() => {
        if(typeof loadSidebar === 'function') loadSidebar();
    });
</script>
</body>
</html>
